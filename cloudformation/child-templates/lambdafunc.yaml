AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  EnvironmentName:
    Type: String
  LargeFileTopic:
    Type: String
  DataTeamTopic:
    Type: String
  FinanceTeamTopic:
    Type: String

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-LambdaProcessingRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
        - arn:aws:iam::aws:policy/AmazonSNSFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/AmazonEventBridgeFullAccess
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        
  NotificationProcessorLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.13
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              pass
      Environment:
        Variables:
          - LARGE_FILE_TOPIC: !Ref LargeFileTopic
          - DATA_TEAM_TOPIC: !Ref DataTeamTopic
          - FINANCE_TEAM_TOPIC: !Ref FinanceTeamTopic
          
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NotificationProcessorLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${EnvironmentName}-Notification-Event"
   
Outputs:

  NotificationProcessorLambdaArn:
    Value: !GetAtt NotificationProcessorLambda.Arn





















